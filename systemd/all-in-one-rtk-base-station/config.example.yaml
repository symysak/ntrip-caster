# Handover endpoints. A client connecting here sends NMEA GGA; the caster
# subscribes it to the nearest online member and re-switches as the client
# moves. Group members manually so each endpoint serves one RTCM flavor.
# handover:
#   - name: AUTO_RTCM32_MSM4
#     identifier: "Nearest RTCM3.2 MSM4"
#     format: "RTCM 3.2"
#     nav_system: "GPS+GLO+GAL+BDS"
#     network: "JP"
#     country: "JPN"
#     # Hysteresis margin (km) to prevent flapping at a boundary: once attached,
#     # a client only switches to another base that is more than this many km
#     # closer than its current one. A base disconnect always fails over
#     # immediately regardless of this margin. 0 = always use the nearest.
#     switch_margin_km: 10
